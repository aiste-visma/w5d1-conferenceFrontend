<form #attendeeForm="ngForm" (ngSubmit)="onSubmit(attendeeForm)">
  <div class="form-group">
    <label for="firstName">First Name:</label>
    <input
      type="text"
      id="firstName"
      name="firstName"
      ngModel
      required
      class="form-control"
    />
  </div>

  <div class="form-group">
    <label for="lastName">Last Name:</label>
    <input
      type="text"
      id="lastName"
      name="lastName"
      ngModel
      required
      class="form-control"
    />
  </div>

  <div class="form-group">
    <label for="userName">Username:</label>
    <input
      type="text"
      id="userName"
      name="userName"
      ngModel
      required
      class="form-control"
    />
  </div>

  <div class="form-group">
    <label for="emailAddress">Email:</label>
    <input
      type="email"
      id="emailAddress"
      name="emailAddress"
      ngModel
      class="form-control"
      #emailCtrl="ngModel"
      pattern="^[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$"
    />
    <div *ngIf="emailCtrl.invalid && emailCtrl.dirty" class="text-danger">
      Please enter a valid email address
    </div>
  </div>

  <button type="submit" [disabled]="!attendeeForm.valid" class="btn btn-primary">
    Register
  </button>
</form>
