<form #attendeeForm="ngForm" (ngSubmit)="onSubmit(attendeeForm)">
  <div class="form-group">
    <label for="firstName">First Name:</label>
    <input
      type="text"
      id="firstName"
      name="firstName"
      [(ngModel)]="attendee.firstName"
      required
      class="form-control"
    />
  </div>

  <div class="form-group">
    <label for="lastName">Last Name:</label>
    <input
      type="text"
      id="lastName"
      name="lastName"
      [(ngModel)]="attendee.lastName"
      required
      class="form-control"
    />
  </div>

  <div class="form-group">
    <label for="userName">Username:</label>
    <input
      type="text"
      id="userName"
      name="userName"
      [(ngModel)]="attendee.userName"
      required
      class="form-control"
    />
  </div>

  <div class="form-group">
    <label for="emailAddress">Email:</label>
    <input
      type="email"
      id="emailAddress"
      name="emailAddress"
      [(ngModel)]="attendee.emailAddress"
      class="form-control"
      #emailCtrl="ngModel"
      pattern="^[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$"
    />
    <div *ngIf="emailCtrl.invalid && emailCtrl.dirty" class="text-danger">
      Please enter a valid email address
    </div>
  </div>

  <button type="submit" [disabled]="!attendeeForm.valid" class="btn btn-primary">
    Register
  </button>
</form>

<div *ngIf="submittedAttendee" class="mt-3">
  <h3>Registered Attendee:</h3>
  <p><strong>First Name:</strong> {{ submittedAttendee.firstName }}</p>
  <p><strong>Last Name:</strong> {{ submittedAttendee.lastName }}</p>
  <p><strong>Username:</strong> {{ submittedAttendee.userName }}</p>
  <p><strong>Email:</strong> {{ submittedAttendee.emailAddress }}</p>
</div>
