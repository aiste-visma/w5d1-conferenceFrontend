<h2>Conference Attendee Registration</h2>

<app-attendee-form (register)="handleAttendeeRegistration($event)"></app-attendee-form>

@if (submittedAttendeeSignal) {
  <div class="mt-3">
    <h3>Registered Attendee:</h3>
    <p><strong>First Name:</strong> {{ submittedAttendeeSignal.firstName }}</p>
    <p><strong>Last Name:</strong> {{ submittedAttendeeSignal.lastName }}</p>
    <p><strong>Username:</strong> {{ submittedAttendeeSignal.userName }}</p>
    <p><strong>Email:</strong> {{ submittedAttendeeSignal.emailAddress }}</p>
  </div>
}

<hr>
<app-session-results [sessions]="mockSessions"></app-session-results>
<hr>
<app-speaker-results [speakers]="mockSpeakers"></app-speaker-results>
